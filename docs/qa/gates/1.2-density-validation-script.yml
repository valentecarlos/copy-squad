recommendations:
  - story: 1.3
    note: |
      validate-structure.js seguirá o mesmo pattern (CommonJS, js-yaml, Node
      stdlib only). Dev pode reutilizar parseFrontmatter() helper de validate-
      density.js — considerar extrair para `scripts/lib/markdown-utils.js` se
      Story 1.3 também precisar. Decisão de extract fica para Dev/Architect.
  - story: 1.4
    note: |
      CI workflow vai chamar `node scripts/validate-density.js` (não --report-only)
      para falhar PRs com agentes/dossiers abaixo do limite. Validar que script
      retorna exit 1 corretamente em GitHub Actions runner.
  - story: 1.7
    note: |
      Quando Halbert dossier landar (≥3500 palavras), validate-density.js já
      estará pronto pra validar. Story 1.7 será o primeiro real-world test do
      script (até agora só fixtures).

