name: validate

on:
  pull_request:
    branches: [main]
  push:
    branches: ['**']

permissions:
  contents: read

jobs:
  validate-structure:
    name: Validate YAML structure
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run validate-structure
        run: node scripts/validate-structure.js

  validate-density:
    name: Validate density (NFR1 + NFR2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run validate-density
        run: node scripts/validate-density.js
      - name: Upload density report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: density-report
          path: density-report.md
          if-no-files-found: ignore

  validate-research-format:
    name: Validate research source format (DEC-002)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Install dependencies
        run: npm ci
      - name: Run validate-research-format
        run: node scripts/validate-research-format.js

  encoding-check:
    name: UTF-8 + LF + no BOM
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Detect BOM
        shell: bash
        run: |
          if grep -rlI $'\xEF\xBB\xBF' . 2>/dev/null; then
            echo "BOM detected — failing CI"
            exit 1
          fi
          echo "No BOM detected"
      - name: Detect CRLF
        shell: bash
        run: |
          # Look for CRLF in tracked text files (excluding .git)
          if find .claude research docs scripts tests -type f \( -name '*.md' -o -name '*.yml' -o -name '*.yaml' -o -name '*.js' -o -name '*.sh' -o -name '*.json' -o -name '*.bats' \) 2>/dev/null | xargs grep -lI $'\r$' 2>/dev/null | grep -v node_modules; then
            echo "CRLF line endings detected — failing CI"
            exit 1
          fi
          echo "No CRLF detected"

  bats-install-tests:
    name: BATS — install script tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup BATS
        uses: bats-core/bats-action@3.0.0
        with:
          bats-version: 1.11.0
      - name: Run BATS install tests
        shell: bash
        run: |
          chmod +x install-copy-squad.sh
          bats tests/install/
